# ModernZ Configuration
# See full options: https://github.com/Samillion/ModernZ

# Layout: default, compact, mini, seekbar
layout=default
# Icon theme: fluent or material
icon_theme=fluent
# Icon style: mixed, filled, outline
icon_style=mixed

# Colors - orange accent like ModernZ default
seekbarfg_color=#FF8232
seek_handle_color=#C96508
seek_handle_border_color=#FF8232
hover_effect_color=#FF8232
nibble_color=#FF8232

# Show current time instead of remaining
timecurrent=yes
# Time format: dynamic or fixed
time_format=dynamic

# Show window controls in borderless/fullscreen
window_controls=yes
# Independent top bar and bottom bar hover zones
windowcontrols_independent=yes
# Show OSC on file start (both top and bottom)
osc_on_start=both

# Buttons
subtitles_button=yes
audio_tracks_button=yes
jump_buttons=yes
jump_amount=10
playlist_button=yes
fullscreen_button=yes
info_button=yes
ontop_button=yes
screenshot_button=yes
loop_button=yes
speed_button=yes
volume_control=yes

# Seekbar height: small, medium, large, xlarge
seekbar_height=medium
# Chapter markers style: gap, triangle, bar, single-bar
nibbles_style=gap

# Persistent progress line at the bottom
persistent_progress=no

# Fade settings
hidetimeout=1500
fadeduration=200
fadein=yes

# Tooltips
tooltip_hints=yes
