# Disable stock OSC (required for ModernZ)
osc=no
# Remove native window title bar for a clean look
title-bar=no

# Keep the OSD visible when pausing, so ModernZ can show its controls
keep-open=yes
# Save watch later position on exit
save-position-on-quit=yes
# Use hardware decoding if available
hwdec=auto-safe
# Enable the select script for ModernZ interactive menus (playlist, audio, subs)
script-binding select
